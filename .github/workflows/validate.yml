name: Validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check merge-conflict markers
        run: bash scripts/check-conflicts.sh

      - name: Check core JS syntax
        run: |
          node --check src/main.js
          node --check src/scene/CarShowcase.js
          node --check src/scene/config.js
